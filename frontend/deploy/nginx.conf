# In-container nginx for the Flow "web" service.
#
# Serves the built SPA and routes API/admin/static/media on the same origin.
# This container sits behind the VPS host nginx, which terminates TLS and
# forwards the original scheme in X-Forwarded-Proto.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25M;   # room for application attachments

    # Django API, admin, and collected static (admin/DRF assets via WhiteNoise).
    location ~ ^/(api|admin|static)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Preserve the https scheme set by the host nginx so Django sees a
        # secure request (secure cookies, correct CSRF origin).
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }

    # User-uploaded files, served straight from the shared media volume.
    location /media/ {
        alias /media/;
        expires 7d;
        access_log off;
    }

    # SPA: hand every other path to the client-side router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

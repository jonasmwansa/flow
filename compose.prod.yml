name: flow

# Production stack for flow.useintelly.com on the shared multi-site VPS.
#
# Mirrors the UseIntelly pattern: host nginx owns 80/443 and reverse-proxies the
# domain to a localhost-only Docker port. Only the "web" (frontend nginx) port is
# published, bound to 127.0.0.1 — postgres and gunicorn stay on the Docker
# network and are never reachable from the internet.
#
# Bring it up with:  docker compose -f compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: .env
    restart: unless-stopped
    # migrate + collectstatic + gunicorn (no demo seeding in production).
    command: ["sh", "/app/start.sh"]
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.create_connection(('127.0.0.1',8000),5); s.close()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./frontend
      args:
        # Baked into the SPA at build time. Same-origin as the served site, so
        # /api/* calls go straight back to this host through nginx.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://flow.useintelly.com}
    restart: unless-stopped
    # Only this port is exposed — bound to localhost for host nginx to proxy.
    ports:
      - "127.0.0.1:${WEB_BIND_PORT:-8010}:80"
    # Serve user uploads straight from the shared media volume (read-only).
    volumes:
      - media_data:/media:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:

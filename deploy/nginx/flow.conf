# Flow site config for the shared multi-site VPS (flow.useintelly.com).
#
# Version-controlled SOURCE for host nginx. NOT applied by the Docker build —
# host nginx is updated deliberately so one site's deploy can't break another:
#
#   sudo cp deploy/nginx/flow.conf /etc/nginx/sites-available/flow
#   sudo ln -s /etc/nginx/sites-available/flow /etc/nginx/sites-enabled/flow
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d flow.useintelly.com
#
# This file is HTTP-only on purpose. `certbot --nginx` rewrites it in place to
# add the 443 server block, the certificate lines, and the HTTP->HTTPS redirect.

upstream flow_web {
    server 127.0.0.1:8010 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name flow.useintelly.com;

    client_max_body_size 25M;
    keepalive_timeout 30s;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://flow_web;
        proxy_read_timeout 120s;
    }
}
